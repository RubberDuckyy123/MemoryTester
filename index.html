<!DOCTYPE html>
<html>
<head>
    <title>Memory Trainer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="MemoryStyle.css">
    <script type="module" src="ShapeDisplayHandler.js" defer></script>
</head>
<body>
    <div id="MainMenuContainer" class="BasicContainer">
        <h1 id="Title" class="dynapuff">memory tester!! :)</h1>
        <template id="DropdownTemplate">
            <div class="DropdownContainer">
                <button data-List="UsedShapes" class="DropdownButton dynapuff">
                    <span class="dynapuff">Shapes Used</span>
                    <img src="DropdownArrow.png" class="flipped">
                </button>
                <div class="DropdownOptions NotRendered"></div>
            </div>
        </template>
        <template id="DropdownButtonTemplate">
            <button data-Value="Thing" class="DropdownButton DropdownOption">
                <span class="dynapuff">Thing</span>
                <img src="CheckBox.png">
            </button>
        </template>
        <button id="StartButton" class="dynapuff ImportantButton">Start</button>
    </div>
    <div id="GameContainer" class="BasicContainer NotRendered" style="background-color: transparent; box-shadow: none;">
        <canvas id="ShapeDisplay" width="1" height="1"></canvas>
        <button id="MemorizeButton" class="dynapuff ImportantButton NotRendered">Memorized!!</button>
        <h1 id="OptionLabel" class="NotRendered invisible">--Shapes--</h1>
        <div class="NotRendered invisible" id="OptionContainer"></div>
        <button id="ReturnToMenuButton" class="dynapuff ImportantButton NotRendered">Return To Menu</button>
    </div>
    <canvas id="UtilCanvas" class="invisible" style="position: absolute;" width="1" height="1"></canvas>
</body>
</html>
