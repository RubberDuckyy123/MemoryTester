<!DOCTYPE html>
<html>
<head>
    <title>Memory Trainer</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="MemoryStyle.css">
    <script type="module" src="ShapeDisplayHandler.js" defer></script>
</head>
<body>
    <div id="MainMenuContainer" class="BasicContainer">
        <h1 id="Title" class="dynapuff">memory trainer!! :)</h1>
        <div id="ShapeSelect" class="DropdownContainer" style="z-index: 4;">
            <button data-List="UsedShapes" class="DropdownButton dynapuff">
                <span class="dynapuff">Shapes Used</span>
                <img src="DropdownArrow.png" class="flipped">
            </button>
            <div class="DropdownOptions NotRendered">
                <button data-Value="Triangle" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Triangle</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="Square" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Square</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="Circle" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Circle</span>
                    <img src="CheckBox.png">
                </button>
            </div>
        </div>
        <div id="ColorSelect" class="DropdownContainer" style="z-index: 3;">
            <button data-List="UsedColors" class="DropdownButton dynapuff">
                <span class="dynapuff">Colors Used</span>
                <img src="DropdownArrow.png" class="flipped">
            </button>
            <div class="DropdownOptions NotRendered">
                <button data-Value="#ff0000e2" class="DropdownButton DropdownOption">
                    <span class="dynapuff" style="color: red">Red</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="#00ff00" class="DropdownButton DropdownOption">
                    <span class="dynapuff" style="color: lightgreen">Green</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="#9000ff" class="DropdownButton DropdownOption">
                    <span class="dynapuff" style="color: #9000ff">Purple</span>
                    <img src="CheckBox.png">
                </button>
            </div>
        </div>
        <div id="FaceSelect" class="DropdownContainer" style="z-index: 2;">
            <button data-List="UsedFaces" class="DropdownButton dynapuff">
                <span class="dynapuff">Faces Used</span>
                <img src="DropdownArrow.png" class="flipped">
            </button>
            <div class="DropdownOptions NotRendered">
                <button data-Value="HappyFace" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Happy Face</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="AngryFace" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Angry Face</span>
                    <img src="CheckBox.png">
                </button>
                <button data-Value="SleepyFace" class="DropdownButton DropdownOption">
                    <span class="dynapuff">Sleepy Face</span>
                    <img src="CheckBox.png">
                </button>
            </div>
        </div>
        <button id="StartButton" class="dynapuff ImportantButton">Start</button>
    </div>
    <div id="GameContainer" class="BasicContainer NotRendered" style="background-color: transparent; box-shadow: none;">
        <canvas id="ShapeDisplay" width="1" height="1"></canvas>
        <button id="MemorizeButton" class="dynapuff ImportantButton NotRendered">Memorized!!</button>
        <h1 id="OptionLabel" class="NotRendered invisible">--Shapes--</h1>
        <div class="NotRendered invisible" id="OptionContainer"></div>
        <button id="ReturnToMenuButton" class="dynapuff ImportantButton NotRendered">Return To Menu</button>
    </div>
    <canvas id="UtilCanvas" class="invisible" style="position: absolute;" width="1" height="1"></canvas>
</body>
</html>
